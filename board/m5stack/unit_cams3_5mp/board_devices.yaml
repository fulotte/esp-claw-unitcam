version: 1.0.0
# Devices Configuration for Unit CamS3-5MP

devices:
  # OV5640 5MP Camera Sensor over DVP 8-bit
  - name: camera
    type: camera
    sub_type: dvp
    version: default
    config:
      dvp_config:
        reset_io: 21
        pwdn_io: -1
        vsync_io: 42
        de_io: 18
        pclk_io: 12
        xclk_io: 11
        xclk_freq: 20000000
        data_width: CAM_CTLR_DATA_WIDTH_8
        data_io:
          data_io_0: 6
          data_io_1: 15
          data_io_2: 16
          data_io_3: 7
          data_io_4: 5
          data_io_5: 10
          data_io_6: 4
          data_io_7: 13
          data_io_8: -1
          data_io_9: -1
          data_io_10: -1
          data_io_11: -1
          data_io_12: -1
          data_io_13: -1
          data_io_14: -1
          data_io_15: -1
    peripherals:
      - name: i2c_master
        frequency: 100000

  # On-board status LED (GPIO14, active-high)
  - name: board_led
    type: gpio_ctrl
    version: default
    config:
      active_level: 1
      default_level: 0
    peripherals:
      - name: gpio_led
