name: Build Unit CamS3-5MP Firmware

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create release with binaries'
        required: false
        default: false
        type: boolean
  push:
    paths:
      - 'board/**'
      - 'skills/**'
      - '.github/workflows/**'

jobs:
  build:
    name: Build Unit CamS3-5MP
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.5
    
    steps:
      - name: Checkout board config
        uses: actions/checkout@v4
        with:
          path: board-config
      
      - name: Clone ESP-Claw framework
        run: |
          . /opt/esp/idf/export.sh
          git clone --depth 1 https://github.com/78/esp-claw.git esp-claw-src
      
      - name: Install build tools
        run: |
          . /opt/esp/idf/export.sh
          python -m pip install --upgrade pip
          python -m pip install idf_build_apps esp-bmgr-assist
      
      - name: Overlay board config
        run: |
          # Copy our board config into the ESP-Claw framework
          cp -r board-config/board/* esp-claw-src/application/edge_agent/boards/
          cp -r board-config/skills/* esp-claw-src/application/edge_agent/fatfs_image/skills/
          
          # List what we added
          echo "=== Board files ==="
          find esp-claw-src/application/edge_agent/boards/m5stack/unit_cams3_5mp -type f
          echo "=== Skill files ==="
          find esp-claw-src/application/edge_agent/fatfs_image/skills/camera_snap -type f
      
      - name: Build firmware
        working-directory: esp-claw-src/application/edge_agent
        env:
          IDF_CCACHE_ENABLE: "1"
          BATCH_BUILD: "1"
          V: "0"
          IDF_CI_BUILD: "1"
        run: |
          . /opt/esp/idf/export.sh
          python ../../.gitlab/ci/build_apps.py . \
            --config "=" \
            -t esp32s3 \
            -r 1 \
            -vv \
            --board unit_cams3_5mp \
            --board-path boards/m5stack
      
      - name: Merge binaries
        working-directory: esp-claw-src/application/edge_agent
        run: |
          . /opt/esp/idf/export.sh
          python ../../.gitlab/ci/merge_bin.py
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-cams3-5mp-firmware
          path: |
            esp-claw-src/application/edge_agent/build*/**/*.bin
            esp-claw-src/application/edge_agent/build*/flash_args
            esp-claw-src/application/edge_agent/build*/flasher_args.json
            esp-claw-src/application/edge_agent/merged_binary/*.bin
          retention-days: 30
      
      - name: Create release
        if: github.event.inputs.create_release == 'true' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            esp-claw-src/application/edge_agent/merged_binary/*.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
